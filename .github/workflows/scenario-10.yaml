name: Scenario 10 – Liveness Probe Failure (Deadlock)

on:
  workflow_dispatch:

env:
  SCENARIO: "10-liveness-probe-failure"
  IMAGE_NAME: "scenario-10-liveness-probe-failure"

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: scenarios/10-liveness-probe-failure/app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: scenarios/10-liveness-probe-failure/app/go.mod

      - name: Run tests
        run: go test -v ./...

      - name: Build binary (verify it compiles)
        run: go build -o /dev/null .

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      id-token: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        id: meta
        env:
          GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
        run: |
          IMAGE="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${IMAGE_NAME}"
          TAG="${IMAGE}:${{ github.sha }}"
          LATEST="${IMAGE}:latest"
          docker build -t "${TAG}" -t "${LATEST}" scenarios/10-liveness-probe-failure/app/
          docker push "${TAG}"
          docker push "${LATEST}"
          echo "image=${TAG}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GKE_CLUSTER_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Substitute image in deployment manifest
        env:
          GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
        run: |
          REGISTRY="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}"
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" \
            scenarios/10-liveness-probe-failure/k8s/deployment.yaml

      - name: Deploy application
        run: |
          kubectl apply -f scenarios/10-liveness-probe-failure/k8s/configmap.yaml
          kubectl apply -f scenarios/10-liveness-probe-failure/k8s/deployment.yaml
          kubectl apply -f scenarios/10-liveness-probe-failure/k8s/service.yaml
          kubectl rollout status deployment/scenario-10-liveness-probe --timeout=120s

      - name: Trigger deadlock and observe liveness probe failures
        run: |
          POD=$(kubectl get pods -l scenario=10-liveness-probe-failure \
                  -o jsonpath='{.items[0].metadata.name}')
          echo "=== Sending 7 /work requests to trigger deadlock (DEADLOCK_AFTER=5) ==="
          for i in $(seq 1 7); do
            kubectl exec "${POD}" -- wget -qO- http://localhost:8080/work 2>/dev/null || true
            sleep 1
          done
          echo ""
          echo "=== Status after deadlock ==="
          kubectl exec "${POD}" -- wget -qO- http://localhost:8080/status 2>/dev/null || true
          echo ""
          echo "Waiting 60s for liveness probe to fail and restart the container..."
          sleep 60
          echo "=== Pod status (expect RESTARTS > 0) ==="
          kubectl get pods -l scenario=10-liveness-probe-failure
          echo ""
          echo "=== Liveness probe failure events ==="
          kubectl describe pod -l scenario=10-liveness-probe-failure \
            | grep -E "(Liveness|Killing|Unhealthy)" | head -15 || true
