name: Scenario 03 – OOMKilled Memory Leak

on:
  push:
    branches: [master, main]
    paths:
      - "scenarios/03-oomkilled-memory-leak/**"
      - ".github/workflows/scenario-03.yaml"
  pull_request:
    paths:
      - "scenarios/03-oomkilled-memory-leak/**"
      - ".github/workflows/scenario-03.yaml"
  workflow_dispatch:

env:
  SCENARIO: "03-oomkilled-memory-leak"
  IMAGE_NAME: "scenario-03-oomkilled-memory-leak"

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build and test the Go application
  # ─────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: scenarios/03-oomkilled-memory-leak/app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: scenarios/03-oomkilled-memory-leak/app/go.mod

      - name: Run tests
        run: go test -v ./...

      - name: Build binary (verify it compiles)
        run: go build -o /dev/null .

  # ──────────────────────────────────────────────────────
  # Job 2: Build Docker image and push to Artifact Registry
  # ──────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      id-token: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        id: meta
        env:
          GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
        run: |
          IMAGE="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${IMAGE_NAME}"
          TAG="${IMAGE}:${{ github.sha }}"
          LATEST="${IMAGE}:latest"

          docker build -t "${TAG}" -t "${LATEST}" \
            scenarios/03-oomkilled-memory-leak/app/

          docker push "${TAG}"
          docker push "${LATEST}"

          echo "image=${TAG}" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────
  # Job 3: Deploy to GKE
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GKE_CLUSTER_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Substitute image in deployment manifest
        env:
          GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
        run: |
          REGISTRY="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}"
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" \
            scenarios/03-oomkilled-memory-leak/k8s/deployment.yaml

      - name: Apply manifests
        run: |
          kubectl apply -f scenarios/03-oomkilled-memory-leak/k8s/configmap.yaml
          kubectl apply -f scenarios/03-oomkilled-memory-leak/k8s/deployment.yaml
          kubectl apply -f scenarios/03-oomkilled-memory-leak/k8s/service.yaml

      - name: Wait for initial rollout
        run: |
          kubectl rollout status deployment/scenario-03-oomkilled --timeout=120s

      - name: Trigger memory leak and wait for OOMKilled
        run: |
          POD=$(kubectl get pods -l scenario=03-oomkilled-memory-leak \
                  -o jsonpath='{.items[0].metadata.name}')
          echo "Triggering leak requests..."
          for i in $(seq 1 5); do
            kubectl exec "${POD}" -- wget -qO- http://localhost:8080/leak 2>/dev/null || true
            sleep 2
          done
          echo "Waiting 30s for OOMKill..."
          sleep 30
          echo "=== Pod status ==="
          kubectl get pods -l scenario=03-oomkilled-memory-leak
          echo "=== Pod description (look for OOMKilled) ==="
          kubectl describe pod -l scenario=03-oomkilled-memory-leak \
            | grep -A 10 "Last State:" || true
