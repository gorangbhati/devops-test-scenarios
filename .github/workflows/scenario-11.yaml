name: Scenario 11 – Resource Quota Exceeded

on:
  workflow_dispatch:

env:
  SCENARIO: "11-resource-quota-exceeded"
  IMAGE_NAME: "scenario-11-resource-quota-exceeded"
  NAMESPACE: "test-scenerios"

jobs:

# ─────────────────────────────────────────────
# Job 1: Lint / unit-test the application code
# ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: scenarios/11-resource-quota-exceeded/app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest

      - name: Run unit tests
        run: |
          if [ -d "../tests" ]; then
            pytest ../tests/ -v
          else
            echo "No tests directory found. Skipping tests."
          fi


# ─────────────────────────────────────────────
# Job 2: Build Docker image and push to GHCR
# ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        id: meta
        run: |
          set -euo pipefail

          IMAGE="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}"
          TAG="${IMAGE}:${{ github.run_number }}"
          LATEST="${IMAGE}:latest"

          echo "Building image ${TAG}"

          docker build -t "${TAG}" -t "${LATEST}" \
            scenarios/11-resource-quota-exceeded/app/

          docker push "${TAG}"
          docker push "${LATEST}"

          echo "image=${TAG}" >> "$GITHUB_OUTPUT"


# ─────────────────────────────────────────────
# Job 3: Deploy to GKE
# ─────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4


# Authenticate to Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}


# Install gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2


# Get cluster credentials
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: us-central1-a
          project_id: ${{ vars.PROJECT_ID }}


# Ensure namespace exists
      - name: Ensure namespace exists
        run: |
          kubectl create namespace ${NAMESPACE} --dry-run=client -o yaml | kubectl apply -f -


# Apply ResourceQuota
      - name: Apply resource quota
        run: |
          set -euo pipefail
          kubectl apply -n "${NAMESPACE}" -f scenarios/11-resource-quota-exceeded/k8s/quota.yaml


# Apply scenario manifests
      - name: Apply Kubernetes manifests
        run: |
          set -euo pipefail
          kubectl apply -n "${NAMESPACE}" -f scenarios/11-resource-quota-exceeded/k8s/


# Show quota status
      - name: Show resource quota
        run: |
          kubectl get resourcequota -n "${NAMESPACE}"
          kubectl describe resourcequota -n "${NAMESPACE}"


# Show pods
      - name: Show pod status
        run: |
          kubectl get pods -n "${NAMESPACE}" -o wide || true
