name: Scenario 15 – Network Policy Block

on:
  workflow_dispatch:

env:
  SCENARIO: "15-network-policy-block"
  IMAGE_NAME: "scenario-15-network-policy-block"
  NAMESPACE: "test-scenerios"

jobs:

  # ─────────────────────────────────────────────
  # Job 1: Lint / unit-test the application
  # ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scenarios/15-network-policy-block/app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test || echo "No tests found"


  # ─────────────────────────────────────────────
  # Job 2: Build Docker image and push to GHCR
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}"
          TAG="${IMAGE}:${{ github.run_number }}"
          LATEST="${IMAGE}:latest"

          docker build -t "${TAG}" -t "${LATEST}" scenarios/15-network-policy-block/app/
          docker push "${TAG}"
          docker push "${LATEST}"

          echo "image=${TAG}" >> "$GITHUB_OUTPUT"


  # ─────────────────────────────────────────────
  # Job 3: Deploy to GKE
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: us-central1-a
          project_id: ${{ vars.PROJECT_ID }}

      - name: Ensure namespace exists
        run: |
          kubectl create namespace ${NAMESPACE} --dry-run=client -o yaml | kubectl apply -f -

      - name: Substitute registry in deployment manifests
        run: |
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" scenarios/15-network-policy-block/k8s/backend.yaml
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" scenarios/15-network-policy-block/k8s/frontend.yaml

      - name: Deploy backend
        run: |
          kubectl apply -n ${NAMESPACE} -f scenarios/15-network-policy-block/k8s/backend.yaml

      - name: Deploy frontend
        run: |
          kubectl apply -n ${NAMESPACE} -f scenarios/15-network-policy-block/k8s/frontend.yaml

      - name: Apply network policy
        run: |
          kubectl apply -n ${NAMESPACE} -f scenarios/15-network-policy-block/k8s/network-policy.yaml

      - name: Show pod status
        run: |
          kubectl get pods -n ${NAMESPACE}
