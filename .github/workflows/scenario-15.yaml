name: Scenario 15 – Network Policy Blocking Traffic

on:
  workflow_dispatch:

env:
  SCENARIO: "15-network-policy-block"
  IMAGE_NAME: "scenario-15-network-policy-block"

jobs:

# ─────────────────────────────────────────────
# Job 1: Lint / unit-test the Node.js apps
# ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install backend dependencies
        run: |
          cd scenarios/15-network-policy-block/backend
          npm install

      - name: Install frontend dependencies
        run: |
          cd scenarios/15-network-policy-block/frontend
          npm install

      - name: Run tests
        run: echo "No tests defined for scenario 15"

# ─────────────────────────────────────────────
# Job 2: Build Docker images and push to Artifact Registry
# ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    

    permissions:
      contents: read
      packages: write

    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push backend image
        id: meta
        run: |
          BACKEND_IMAGE="ghcr.io/${{ github.repository_owner }}/scenario-15-backend"
          FRONTEND_IMAGE="ghcr.io/${{ github.repository_owner }}/scenario-15-frontend"

          docker build -t ${BACKEND_IMAGE}:latest \
            scenarios/15-network-policy-block/backend/

          docker build -t ${FRONTEND_IMAGE}:latest \
            scenarios/15-network-policy-block/frontend/

          docker push ${BACKEND_IMAGE}:latest
          docker push ${FRONTEND_IMAGE}:latest

          echo "backend_image=${BACKEND_IMAGE}:latest" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${FRONTEND_IMAGE}:latest" >> "$GITHUB_OUTPUT"

# ─────────────────────────────────────────────
# Job 3: Deploy to GKE
# ─────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2


      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: us-central1-a
          project_id: ${{ vars.PROJECT_ID }}

      - name: Deploy backend
        run: |
          kubectl apply -f scenarios/15-network-policy-block/k8s/backend.yaml

      - name: Deploy frontend
        run: |
          kubectl apply -f scenarios/15-network-policy-block/k8s/frontend.yaml

      - name: Apply network policy
        run: |
          kubectl apply -f scenarios/15-network-policy-block/k8s/networkpolicy.yaml

      - name: Show pods
        run: |
          kubectl get pods -l app=backend15
          kubectl get pods -l app=frontend15
