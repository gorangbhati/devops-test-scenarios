name: Scenario 12 – Rolling Update Stuck

on:
  workflow_dispatch:

env:
  SCENARIO: "12-rolling-update-stuck"
  IMAGE_NAME: "scenario-12-rolling-update-stuck"

jobs:

# ─────────────────────────────────────────────
# Job 1: Lint / unit-test the Node.js app
# ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scenarios/12-rolling-update-stuck/app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test || echo "No tests found"

# ─────────────────────────────────────────────
# Job 2: Build Docker image and push to Artifact Registry
# ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      id-token: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        id: meta
        env:
          GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
        run: |
          IMAGE="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${IMAGE_NAME}"
          TAG="${IMAGE}:${{ github.sha }}"
          LATEST="${IMAGE}:latest"

          docker build -t "${TAG}" -t "${LATEST}" \
            scenarios/12-rolling-update-stuck/app/

          docker push "${TAG}"
          docker push "${LATEST}"

          echo "image=${TAG}" >> "$GITHUB_OUTPUT"

# ─────────────────────────────────────────────
# Job 3: Deploy to GKE
# ─────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GKE_CLUSTER_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Substitute image in deployment manifest
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
        run: |
          REGISTRY="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}"
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" \
            scenarios/12-rolling-update-stuck/k8s/deployment.yaml

      - name: Deploy application
        run: |
          kubectl apply -f scenarios/12-rolling-update-stuck/k8s/deployment.yaml

      - name: Wait and show pod status
        run: |
          sleep 60
          kubectl get pods -l scenario=12-rolling-update-stuck
