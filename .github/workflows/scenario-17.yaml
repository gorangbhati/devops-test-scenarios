name: Scenario 17 – Unhandled Exception Checkout

on:
  workflow_dispatch:

env:
  SCENARIO: "17-unhandled-exception-checkout"
  IMAGE_NAME: "scenario-17-unhandled-exception-checkout"

jobs:

# --------------------------------
# Job 1: Test Python application
# --------------------------------
  test:
    name: Test Python App
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd scenarios/17-unhandled-exception-checkout/app
          pip install -r requirements.txt

      - name: Run tests
        run: |
          echo "No automated tests defined for scenario 17"

# --------------------------------
# Job 2: Build & Push Docker Image
# --------------------------------
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test
    

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push image
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/scenario-17-unhandled-exception-checkout"

          docker build -t ${IMAGE}:latest \
            scenarios/17-unhandled-exception-checkout/app/

          docker push ${IMAGE}:latest

          echo "image=${IMAGE}:latest" >> "$GITHUB_OUTPUT"

# --------------------------------
# Job 3: Deploy to GKE
# --------------------------------
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE cluster location
        id: cluster
        run: |
          LOCATION=$(gcloud container clusters list \
            --project="${{ vars.PROJECT_ID }}" \
            --filter="name=${{ vars.CLUSTER_NAME }}" \
            --format="value(location)")
          echo "location=${LOCATION}" >> "$GITHUB_OUTPUT"

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: ${{ steps.cluster.outputs.location }}
          project_id: ${{ vars.PROJECT_ID }}

      - name: Substitute images in deployment manifest
        run: |
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" \
            scenarios/17-unhandled-exception-checkout/k8s/deployment.yaml

      - name: Deploy scenario
        run: |
          kubectl apply -f scenarios/17-unhandled-exception-checkout/k8s/

      - name: Verify deployment
        run: |
          kubectl get pods -l scenario=17-unhandled-exception-checkout
