name: Scenario 17 – Unhandled Exception Checkout

on:
  push:
    branches: [master, main]
    paths:
      - "scenarios/17-unhandled-exception-checkout/**"
      - ".github/workflows/scenario-17.yaml"
  pull_request:
    paths:
      - "scenarios/17-unhandled-exception-checkout/**"
      - ".github/workflows/scenario-17.yaml"
  workflow_dispatch:

env:
  SCENARIO: "17-unhandled-exception-checkout"
  IMAGE_NAME: "scenario-17-unhandled-exception-checkout"

jobs:

# --------------------------------
# Job 1: Test Python application
# --------------------------------
  test:
    name: Test Python App
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd scenarios/17-unhandled-exception-checkout/app
          pip install -r requirements.txt

      - name: Run tests
        run: |
          echo "No automated tests defined for scenario 17"

# --------------------------------
# Job 2: Build & Push Docker Image
# --------------------------------
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      id-token: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${{ secrets.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push image
        id: meta
        env:
          GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
        run: |
          IMAGE="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/scenario-17-unhandled-exception-checkout"

          docker build -t ${IMAGE}:latest \
            scenarios/17-unhandled-exception-checkout/app/

          docker push ${IMAGE}:latest

          echo "image=${IMAGE}:latest" >> "$GITHUB_OUTPUT"

# --------------------------------
# Job 3: Deploy to GKE
# --------------------------------
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GKE_CLUSTER_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy scenario
        run: |
          kubectl apply -f scenarios/17-unhandled-exception-checkout/k8s/

      - name: Verify deployment
        run: |
          kubectl get pods -l scenario=17-unhandled-exception-checkout
