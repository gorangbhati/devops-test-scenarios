name: Scenario 06 – TLS Ingress Failure

on:
  workflow_dispatch:

env:
  SCENARIO: "06-tls-ingress-failure"
  IMAGE_NAME: "scenario-06-tls-ingress-failure"
  NAMESPACE: "test-scenerios"

jobs:

  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: scenarios/06-tls-ingress-failure/app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run unit tests (if present)
        run: |
          if npm run | grep -q "test"; then
            npm test
          else
            echo "No tests found, skipping."
          fi


  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}"
          TAG="${IMAGE}:${{ github.run_number }}"
          LATEST="${IMAGE}:latest"

          docker build -t "${TAG}" -t "${LATEST}" scenarios/06-tls-ingress-failure/app/
          docker push "${TAG}"
          docker push "${LATEST}"

          echo "image=${TAG}" >> "$GITHUB_OUTPUT"


  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: us-central1-a
          project_id: ${{ vars.PROJECT_ID }}

      - name: Ensure namespace exists
        run: |
          kubectl create namespace ${NAMESPACE} --dry-run=client -o yaml | kubectl apply -f -

      - name: Substitute registry in deployment manifest
        run: |
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" scenarios/06-tls-ingress-failure/k8s/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -n ${NAMESPACE} -f scenarios/06-tls-ingress-failure/k8s/

      - name: Verify deployment
        run: |
          kubectl get all -n ${NAMESPACE}
