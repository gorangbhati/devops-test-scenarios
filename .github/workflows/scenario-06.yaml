name: Scenario 06 – TLS Ingress Failure

on:
  push:
    branches: [master, main]
    paths:
      - "scenarios/06-tls-ingress-failure/**"
      - ".github/workflows/scenario-06.yaml"
  pull_request:
    paths:
      - "scenarios/06-tls-ingress-failure/**"
      - ".github/workflows/scenario-06.yaml"
  workflow_dispatch:

env:
  SCENARIO: "06-tls-ingress-failure"
  IMAGE_NAME: "scenario-06-tls-ingress-failure"

jobs:

  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scenarios/06-tls-ingress-failure/app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test || echo "No tests"

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: |
          gcloud auth configure-docker ${{ secrets.GAR_LOCATION }}-docker.pkg.dev --quiet

      - run: |
          IMAGE="${{ secrets.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPOSITORY }}/${IMAGE_NAME}"

          docker build -t ${IMAGE}:latest scenarios/06-tls-ingress-failure/app
          docker push ${IMAGE}:latest

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GKE_CLUSTER_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - run: kubectl apply -f scenarios/06-tls-ingress-failure/k8s/
