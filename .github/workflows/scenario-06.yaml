name: Scenario 06 – TLS Ingress Failure

on:
  workflow_dispatch:

env:
  SCENARIO: "06-tls-ingress-failure"
  IMAGE_NAME: "scenario-06-tls-ingress-failure"
  NAMESPACE: "test-scenerios"

jobs:

  # ─────────────────────────────────────────────
  # Job 1: Lint / unit-test the application code
  # ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: scenarios/06-tls-ingress-failure/app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test


  # ─────────────────────────────────────────────
  # Job 2: Build Docker image and push to GHCR
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        id: meta
        run: |
          set -euo pipefail

          IMAGE="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}"
          TAG="${IMAGE}:${{ github.run_number }}"
          LATEST="${IMAGE}:latest"

          echo "Building image ${TAG}"

          docker build -t "${TAG}" -t "${LATEST}" \
            scenarios/06-tls-ingress-failure/app/

          docker push "${TAG}"
          docker push "${LATEST}"

          echo "image=${TAG}" >> "$GITHUB_OUTPUT"


  # ─────────────────────────────────────────────
  # Job 3: Deploy to GKE
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: us-central1-a
          project_id: ${{ vars.PROJECT_ID }}

      # Ensure namespace exists
      - name: Ensure namespace exists
        run: |
          set -euo pipefail
          if ! kubectl get namespace "${NAMESPACE}" >/dev/null 2>&1; then
            echo "Creating namespace ${NAMESPACE}"
            kubectl create namespace "${NAMESPACE}"
          else
            echo "Namespace ${NAMESPACE} already exists"
          fi

      # Replace registry placeholder
      - name: Substitute registry in manifests
        run: |
          set -euo pipefail
          REGISTRY="ghcr.io/${{ github.repository_owner }}"

          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" \
            scenarios/06-tls-ingress-failure/k8s/deployment.yaml

      # Apply manifests
      - name: Apply Kubernetes manifests
        run: |
          set -euo pipefail
          kubectl apply -f scenarios/06-tls-ingress-failure/k8s/

      # Verify resources
      - name: Verify deployment
        run: |
          set -euo pipefail
          kubectl get all -n "${NAMESPACE}"
