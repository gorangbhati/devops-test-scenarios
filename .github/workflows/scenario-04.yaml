name: Scenario 04 – Connection Refused to Internal Microservice

on:
  workflow_dispatch:

env:
  SCENARIO: "04-connection-refused"

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Test both services
  # ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run unit tests
        run: pytest scenarios/04-connection-refused/tests/ -v

  # ──────────────────────────────────────────────────────
  # Job 2: Build and push both Docker images
  # ──────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push backend image
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/scenario-04-backend"
          docker build -t "${IMAGE}:${{ github.sha }}" -t "${IMAGE}:latest" \
            scenarios/04-connection-refused/backend/app/
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      - name: Build and push frontend image
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/scenario-04-frontend"
          docker build -t "${IMAGE}:${{ github.sha }}" -t "${IMAGE}:latest" \
            scenarios/04-connection-refused/frontend/app/
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

  # ──────────────────────────────────────────
  # Job 3: Deploy to GKE
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE cluster location
        id: cluster
        run: |
          LOCATION=$(gcloud container clusters list \
            --project="${{ vars.PROJECT_ID }}" \
            --filter="name=${{ vars.CLUSTER_NAME }}" \
            --format="value(location)")
          echo "location=${LOCATION}" >> "$GITHUB_OUTPUT"

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: ${{ steps.cluster.outputs.location }}
          project_id: ${{ vars.PROJECT_ID }}

      - name: Substitute images in deployment manifest
        run: |
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" \
            scenarios/04-connection-refused/k8s/deployments.yaml

      - name: Apply manifests
        run: |
          kubectl apply -f scenarios/04-connection-refused/k8s/backend-configmap.yaml
          kubectl apply -f scenarios/04-connection-refused/k8s/frontend-configmap.yaml
          kubectl apply -f scenarios/04-connection-refused/k8s/deployments.yaml
          kubectl apply -f scenarios/04-connection-refused/k8s/services.yaml

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/scenario-04-backend --timeout=120s
          kubectl rollout status deployment/scenario-04-frontend --timeout=120s

      - name: Demonstrate the connection-refused error
        run: |
          set -euo pipefail

          # Get pods safely
          FRONTEND_POD=$(kubectl get pods -l app=scenario-04-frontend -o jsonpath='{.items[0].metadata.name}' || true)
          BACKEND_POD=$(kubectl get pods -l app=scenario-04-backend -o jsonpath='{.items[0].metadata.name}' || true)

          echo "Frontend pod: ${FRONTEND_POD}"
          echo "Backend pod: ${BACKEND_POD}"

          if [ -z "$BACKEND_POD" ] || [ -z "$FRONTEND_POD" ]; then
           echo "❌ Pods not found"
           kubectl get pods
           exit 1
          fi

          echo ""
          echo "=== Backend is healthy ==="
          kubectl exec "${BACKEND_POD}" -- curl -s http://localhost:5000/api/data || true

          echo ""
          echo "=== Frontend returns 502 (wrong BACKEND_URL port) ==="
          kubectl exec "${FRONTEND_POD}" -- curl -s http://localhost:8080/api/proxy || true

          echo ""
          echo "=== Frontend logs (shows Connection refused errors) ==="
          kubectl logs "${FRONTEND_POD}" --tail=20
