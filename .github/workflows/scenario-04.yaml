name: Scenario 04 – Connection Refused to Internal Microservice

on:
  workflow_dispatch:

env:
  SCENARIO: "04-connection-refused"

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Test both services
  # ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run unit tests
        run: pytest scenarios/04-connection-refused/tests/ -v

  # ──────────────────────────────────────────────────────
  # Job 2: Build and push both Docker images
  # ──────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push backend image
        env:
          GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
        run: |
          IMAGE="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/scenario-04-backend"
          docker build -t "${IMAGE}:${{ github.run_number }}" -t "${IMAGE}:latest" \
            scenarios/04-connection-refused/backend/app/
          docker push "${IMAGE}:${{ github.run_number }}"
          docker push "${IMAGE}:latest"

      - name: Build and push frontend image
        env:
          GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
        run: |
          IMAGE="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/scenario-04-frontend"
          docker build -t "${IMAGE}:${{ github.run_number }}" -t "${IMAGE}:latest" \
            scenarios/04-connection-refused/frontend/app/
          docker push "${IMAGE}:${{ github.run_number }}"
          docker push "${IMAGE}:latest"

  # ──────────────────────────────────────────
  # Job 3: Deploy to GKE
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GKE_CLUSTER_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Substitute images in deployment manifest
        env:
          GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
        run: |
          REGISTRY="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}"
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" \
            scenarios/04-connection-refused/k8s/deployments.yaml

      - name: Apply manifests
        run: |
          kubectl apply -f scenarios/04-connection-refused/k8s/backend-configmap.yaml
          kubectl apply -f scenarios/04-connection-refused/k8s/frontend-configmap.yaml
          kubectl apply -f scenarios/04-connection-refused/k8s/deployments.yaml
          kubectl apply -f scenarios/04-connection-refused/k8s/services.yaml

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/scenario-04-backend --timeout=120s
          kubectl rollout status deployment/scenario-04-frontend --timeout=120s

      - name: Demonstrate the connection-refused error
        run: |
          set -euo pipefail

          # Get pods safely
          FRONTEND_POD=$(kubectl get pods -l app=scenario-04-frontend -o jsonpath='{.items[0].metadata.name}' || true)
          BACKEND_POD=$(kubectl get pods -l app=scenario-04-backend -o jsonpath='{.items[0].metadata.name}' || true)

          echo "Frontend pod: ${FRONTEND_POD}"
          echo "Backend pod: ${BACKEND_POD}"

          if [ -z "$BACKEND_POD" ] || [ -z "$FRONTEND_POD" ]; then
           echo "❌ Pods not found"
           kubectl get pods
           exit 1
          fi

          echo ""
          echo "=== Backend is healthy ==="
          kubectl exec "${BACKEND_POD}" -- curl -s http://localhost:5000/api/data || true

          echo ""
          echo "=== Frontend returns 502 (wrong BACKEND_URL port) ==="
          kubectl exec "${FRONTEND_POD}" -- curl -s http://localhost:8080/api/proxy || true

          echo ""
          echo "=== Frontend logs (shows Connection refused errors) ==="
          kubectl logs "${FRONTEND_POD}" --tail=20
