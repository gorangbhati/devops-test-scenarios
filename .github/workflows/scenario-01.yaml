name: Scenario 01 – CrashLoop Bad Config

on:
  workflow_dispatch:

env:
  SCENARIO: "01-crashloop-bad-config"
  IMAGE_NAME: "scenario-01-crashloop-bad-config"

jobs:

  # ─────────────────────────────────────────────
  # Job 1: Lint / unit-test the application code
  # ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scenarios/01-crashloop-bad-config/app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run unit tests
        run: pytest ../tests/ -v


  # ──────────────────────────────────────────────────────
  # Job 2: Build Docker image and push to Artifact Registry
  # ──────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      id-token: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        id: meta
        env:
          GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
        run: |
          IMAGE="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${IMAGE_NAME}"
          TAG="${IMAGE}:${{ github.run_number }}"
          LATEST="${IMAGE}:latest"

          echo "Building image: ${TAG}"

          docker build -t "${TAG}" -t "${LATEST}" \
            scenarios/01-crashloop-bad-config/app/

          docker push "${TAG}"
          docker push "${LATEST}"

          echo "image=${TAG}" >> "$GITHUB_OUTPUT"


  # ──────────────────────────────────────────
  # Job 3: Deploy to GKE
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GKE_CLUSTER_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Substitute image in deployment manifest
        run: |
          IMAGE="${{ needs.build-and-push.outputs.image }}"

          echo "Using image: ${IMAGE}"

          sed -i "s|IMAGE_PLACEHOLDER|${IMAGE}|g" \
            scenarios/01-crashloop-bad-config/k8s/deployment.yaml

      - name: Show deployment manifest
        run: |
          cat scenarios/01-crashloop-bad-config/k8s/deployment.yaml

      - name: Apply ConfigMap
        run: |
          kubectl apply -f scenarios/01-crashloop-bad-config/k8s/configmap.yaml

      - name: Apply Deployment
        run: |
          kubectl apply -f scenarios/01-crashloop-bad-config/k8s/deployment.yaml

      - name: Wait and show pod status
        run: |
          echo "Waiting for CrashLoopBackOff..."
          sleep 40

          echo "=== Pod Status ==="
          kubectl get pods -l scenario=01-crashloop-bad-config

          POD=$(kubectl get pods -l scenario=01-crashloop-bad-config \
                -o jsonpath='{.items[0].metadata.name}')

          echo ""
          echo "=== Pod Logs ==="
          kubectl logs "${POD}" --previous || kubectl logs "${POD}" || true

          echo ""
          echo "=== Pod Events ==="
          kubectl describe pod "${POD}" | grep -A 20 "Events:"
