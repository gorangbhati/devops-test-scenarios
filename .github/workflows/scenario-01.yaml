name: Scenario 01 – CrashLoop Bad Config

on:
  workflow_dispatch:

env:
  SCENARIO: "01-crashloop-bad-config"
  IMAGE_NAME: "scenario-01-crashloop-bad-config"

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint / unit-test the application code
  # ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: scenarios/01-crashloop-bad-config/app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run unit tests
        run: pytest ../tests/ -v
        # Tests live in scenarios/01-crashloop-bad-config/tests/

  # ──────────────────────────────────────────────────────
  # Job 2: Build Docker image and push to Artifact Registry
  # ──────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    # Only push on commits to master/main (not on PRs)
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}"
          TAG="${IMAGE}:${{ github.sha }}"
          LATEST="${IMAGE}:latest"

          docker build -t "${TAG}" -t "${LATEST}" \
            scenarios/01-crashloop-bad-config/app/

          docker push "${TAG}"
          docker push "${LATEST}"

          echo "image=${TAG}" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────
  # Job 3: Deploy to GKE
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE cluster location
        id: cluster
        run: |
          LOCATION=$(gcloud container clusters list \
            --project="${{ vars.PROJECT_ID }}" \
            --filter="name=${{ vars.CLUSTER_NAME }}" \
            --format="value(location)")
          echo "location=${LOCATION}" >> "$GITHUB_OUTPUT"

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: ${{ steps.cluster.outputs.location }}
          project_id: ${{ vars.PROJECT_ID }}

      - name: Substitute image in deployment manifest
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
        run: |
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" \
            scenarios/01-crashloop-bad-config/k8s/deployment.yaml

      - name: Apply ConfigMap (bad config — triggers CrashLoop)
        run: |
          kubectl apply -f scenarios/01-crashloop-bad-config/k8s/configmap.yaml

      - name: Apply Deployment
        run: |
          kubectl apply -f scenarios/01-crashloop-bad-config/k8s/deployment.yaml

      - name: Wait and show pod status
        run: |
          echo "Waiting 60 seconds for pods to start crashing…"
          sleep 60
          echo "=== Pod Status ==="
          kubectl get pods -l scenario=01-crashloop-bad-config
          echo ""
          echo "=== Pod Logs (last crash) ==="
          POD=$(kubectl get pods -l scenario=01-crashloop-bad-config \
                  -o jsonpath='{.items[0].metadata.name}')
          kubectl logs "${POD}" --previous || kubectl logs "${POD}" || true
          echo ""
          echo "=== Pod Events ==="
          kubectl describe pod "${POD}" | grep -A 20 "Events:"
