name: Scenario 01 – CrashLoop Bad Config

on:
  workflow_dispatch:

env:
  SCENARIO: "01-crashloop-bad-config"
  IMAGE_NAME: "scenario-01-crashloop-bad-config"

jobs:

  # ─────────────────────────────────────────────
  # Job 1: Lint / unit-test the application code
  # ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scenarios/01-crashloop-bad-config/app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run unit tests
        run: pytest ../tests/ -v


  # ─────────────────────────────────────────────
  # Job 2: Build Docker image and push to Artifact Registry
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        env:
          GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
        run: |
          IMAGE="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${IMAGE_NAME}"

          TAG="${IMAGE}:${{ github.run_number }}"
          LATEST="${IMAGE}:latest"

          echo "Building image: ${TAG}"

          docker build -t "${TAG}" -t "${LATEST}" \
            scenarios/01-crashloop-bad-config/app/

          docker push "${TAG}"
          docker push "${LATEST}"


  # ─────────────────────────────────────────────
  # Job 3: Deploy to GKE
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GKE_CLUSTER_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Substitute registry in deployment manifest
        env:
          GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
        run: |
          REGISTRY="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}"

          echo "Using registry: $REGISTRY"

          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" \
            scenarios/01-crashloop-bad-config/k8s/deployment.yaml

      - name: Show deployment YAML
        run: |
          cat scenarios/01-crashloop-bad-config/k8s/deployment.yaml

      - name: Apply ConfigMap
        run: |
          kubectl apply -f scenarios/01-crashloop-bad-config/k8s/configmap.yaml

      - name: Apply Deployment
        run: |
          kubectl apply -f scenarios/01-crashloop-bad-config/k8s/deployment.yaml

      - name: Wait and show pod status
        run: |
          sleep 40
          kubectl get pods -l scenario=01-crashloop-bad-config
