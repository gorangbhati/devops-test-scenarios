name: Scenario 13 – HPA Not Scaling

on:
  workflow_dispatch:

env:
  SCENARIO: "13-hpa-not-scaling"
  IMAGE_NAME: "scenario-13-hpa-not-scaling"
  NAMESPACE: "test-scenerios"

jobs:

  # ─────────────────────────────────────────────
  # Job 1: Lint / unit-test the application
  # ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scenarios/13-hpa-not-scaling/app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm install
          else
            echo "No package.json found. Skipping npm install."
          fi

      - name: Run tests
        run: |
          if [ -f "package.json" ]; then
            npm test
          else
            echo "No tests found. Skipping tests."
           fi


  # ─────────────────────────────────────────────
  # Job 2: Build Docker image and push to GHCR
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}"
          TAG="${IMAGE}:${{ github.run_number }}"
          LATEST="${IMAGE}:latest"

          docker build -t "${TAG}" -t "${LATEST}" scenarios/13-hpa-not-scaling/app/
          docker push "${TAG}"
          docker push "${LATEST}"

          echo "image=${TAG}" >> "$GITHUB_OUTPUT"


  # ─────────────────────────────────────────────
  # Job 3: Deploy to GKE
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: us-central1-a
          project_id: ${{ vars.PROJECT_ID }}

      - name: Ensure namespace exists
        run: |
          kubectl create namespace ${NAMESPACE} --dry-run=client -o yaml | kubectl apply -f -

      - name: Substitute registry in deployment manifest
        run: |
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" scenarios/13-hpa-not-scaling/k8s/deployment.yaml

      - name: Deploy application
        run: |
          kubectl apply -n ${NAMESPACE} -f scenarios/13-hpa-not-scaling/k8s/deployment.yaml
          kubectl apply -n ${NAMESPACE} -f scenarios/13-hpa-not-scaling/k8s/hpa.yaml

      - name: Show deployment and HPA
        run: |
          kubectl get pods -n ${NAMESPACE}
          kubectl get hpa -n ${NAMESPACE}
