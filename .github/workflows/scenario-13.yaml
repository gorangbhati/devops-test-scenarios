name: Scenario 13 – HPA Not Scaling

on:
  workflow_dispatch:

env:
  SCENARIO: "13-hpa-not-scaling"
  IMAGE_NAME: "scenario-13-hpa-not-scaling"

jobs:

# ─────────────────────────────────────────────
# Job 1: Lint / unit-test the Python app
# ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scenarios/13-hpa-not-scaling/app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest

      - name: Run tests
        run: |
          pytest ../tests/ -v || echo "No tests found"

# ─────────────────────────────────────────────
# Job 2: Build Docker image and push to Artifact Registry
# ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}" 
          TAG="${IMAGE}:${{ github.run_number }}"
          LATEST="${IMAGE}:latest"

          docker build -t "${TAG}" -t "${LATEST}" \
            scenarios/13-hpa-not-scaling/app/

          docker push "${TAG}"
          docker push "${LATEST}"

          echo "image=${TAG}" >> "$GITHUB_OUTPUT"

# ─────────────────────────────────────────────
# Job 3: Deploy to GKE
# ─────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: us-central1-a
          project_id: ${{ vars.PROJECT_ID }}

      - name: Substitute image in deployment manifest
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
        run: |
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" \
            scenarios/13-hpa-not-scaling/k8s/deployment.yaml

      - name: Deploy application
        run: |
          kubectl apply -f scenarios/13-hpa-not-scaling/k8s/deployment.yaml

      - name: Deploy HPA
        run: |
          kubectl apply -f scenarios/13-hpa-not-scaling/k8s/hpa.yaml

      - name: Show HPA status
        run: |
          kubectl get hpa
