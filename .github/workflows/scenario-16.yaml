name: Scenario 16 – Background Goroutine Panic

on:
  push:
    branches: [master, main]
    paths:
      - "scenarios/16-background-goroutine-panic/**"
      - ".github/workflows/scenario-16.yaml"
  pull_request:
    paths:
      - "scenarios/16-background-goroutine-panic/**"
      - ".github/workflows/scenario-16.yaml"
  workflow_dispatch:

env:
  SCENARIO: "16-background-goroutine-panic"
  IMAGE_NAME: "scenario-16-background-goroutine-panic"

jobs:

# ------------------------------
# Job 1: Test Go application
# ------------------------------
  test:
    name: Test Go App
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: |
          cd scenarios/16-background-goroutine-panic/app
          go mod tidy

      - name: Run tests
        run: |
          cd scenarios/16-background-goroutine-panic/app
          go test ./... || true

# ------------------------------
# Job 2: Build & Push Docker Image
# ------------------------------
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      id-token: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${{ secrets.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push image
        id: meta
        env:
          GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
        run: |
          IMAGE="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/scenario-16-background-goroutine-panic"

          docker build -t ${IMAGE}:latest \
            scenarios/16-background-goroutine-panic/app/

          docker push ${IMAGE}:latest

          echo "image=${IMAGE}:latest" >> "$GITHUB_OUTPUT"

# ------------------------------
# Job 3: Deploy to GKE
# ------------------------------
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GKE_CLUSTER_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Substitute images in deployment manifest
        env:
          GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
        run: |
          REGISTRY="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}"
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" \
            scenarios/16-background-goroutine-panic/k8s/deployment.yaml

      - name: Deploy scenario
        run: |
          kubectl apply -f scenarios/16-background-goroutine-panic/k8s/

      - name: Show pods
        run: |
          kubectl get pods -l scenario=16-background-goroutine-panic
