name: Scenario 16 – Background Goroutine Panic

on:
  workflow_dispatch:

env:
  SCENARIO: "16-background-goroutine-panic"
  IMAGE_NAME: "scenario-16-background-goroutine-panic"

jobs:

# ------------------------------
# Job 1: Test Go application
# ------------------------------
  test:
    name: Test Go App
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: |
          cd scenarios/16-background-goroutine-panic/app
          go mod tidy

      - name: Run tests
        run: |
          cd scenarios/16-background-goroutine-panic/app
          go test ./... || true

# ------------------------------
# Job 2: Build & Push Docker Image
# ------------------------------
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push image
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/scenario-16-background-goroutine-panic"

          docker build -t ${IMAGE}:latest \
            scenarios/16-background-goroutine-panic/app/

          docker push ${IMAGE}:latest

          echo "image=${IMAGE}:latest" >> "$GITHUB_OUTPUT"

# ------------------------------
# Job 3: Deploy to GKE
# ------------------------------
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE cluster location
        id: cluster
        run: |
          LOCATION=$(gcloud container clusters list \
            --project="${{ vars.PROJECT_ID }}" \
            --filter="name=${{ vars.CLUSTER_NAME }}" \
            --format="value(location)")
          echo "location=${LOCATION}" >> "$GITHUB_OUTPUT"

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: ${{ steps.cluster.outputs.location }}
          project_id: ${{ vars.PROJECT_ID }}

      - name: Substitute images in deployment manifest
        run: |
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" \
            scenarios/16-background-goroutine-panic/k8s/deployment.yaml

      - name: Deploy scenario
        run: |
          kubectl apply -f scenarios/16-background-goroutine-panic/k8s/

      - name: Show pods
        run: |
          kubectl get pods -l scenario=16-background-goroutine-panic
