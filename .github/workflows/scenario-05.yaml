name: Scenario 05 – PVC Stuck in Pending

on:
  workflow_dispatch:

env:
  SCENARIO: "05-pvc-pending"
  IMAGE_NAME: "scenario-05-pvc-pending"

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint / unit-test the application code
  # ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run unit tests
        run: pytest scenarios/05-pvc-pending/tests/ -v

  # ──────────────────────────────────────────────────────
  # Job 2: Build Docker image and push to Artifact Registry
  # ──────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}"
          TAG="${IMAGE}:${{ github.run_number }}"
          LATEST="${IMAGE}:latest"
          docker build -t "${TAG}" -t "${LATEST}" scenarios/05-pvc-pending/app/
          docker push "${TAG}"
          docker push "${LATEST}"
          echo "image=${TAG}" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────
  # Job 3: Deploy to GKE
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: us-central1-a
          project_id: ${{ vars.PROJECT_ID }}

      - name: Substitute image in deployment manifest
        run: |
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" \
            scenarios/05-pvc-pending/k8s/deployment.yaml

      - name: Apply manifests (PVC with bad StorageClass → stuck in Pending)
        run: |
          kubectl apply -f scenarios/05-pvc-pending/k8s/pvc.yaml
          kubectl apply -f scenarios/05-pvc-pending/k8s/configmap.yaml
          kubectl apply -f scenarios/05-pvc-pending/k8s/deployment.yaml
          kubectl apply -f scenarios/05-pvc-pending/k8s/service.yaml

      - name: Show PVC and pod status
        run: |
          echo "=== PVC Status (expect Pending) ==="
          kubectl get pvc scenario-05-data -o wide || true
          echo ""
          echo "=== Pod Status (expect Pending) ==="
          kubectl get pods -l scenario=05-pvc-pending
          echo ""
          echo "=== PVC Events ==="
          kubectl describe pvc scenario-05-data | grep -A 20 "Events:" || true
          echo ""
          echo "=== Pod Events ==="
          POD=$(kubectl get pods -l scenario=05-pvc-pending \
                  -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -n "${POD}" ]; then
            kubectl describe pod "${POD}" | grep -A 10 "Events:" || true
          fi
