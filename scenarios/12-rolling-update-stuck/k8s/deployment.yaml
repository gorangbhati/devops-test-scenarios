apiVersion: apps/v1
kind: Deployment
metadata:
  name: scenario-12-rolling-update
  namespace: test-scenerios
  labels:
    scenario: "12-rolling-update-stuck"
spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: scenario-12

  template:
    metadata:
      labels:
        app: scenario-12

    spec:
      containers:
      - name: app
        image: us-central1-docker.pkg.dev/lunar-parsec-457813-u5/test-scenerio-kloudmate/scenario-12-rolling-update-stuck:latest
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
        ports:
        - containerPort: 8080

        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
