apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scenario-13-hpa
  namespace: test-scenerios
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scenario-13-hpa
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
